# Маппинги, нужные агентам для принятия решений.
# На старте большинство пустые — заполним по мере роста.

# email → mattermost-username.
# Используется Communicator'ом, когда Dev-агент просит "спроси у автора коммита".
# Автор коммита берётся из git blame → email → ищем здесь.
# Если email не найден — Communicator попробует найти пользователя в MM по email через API.
email_to_mattermost:
  # "ivan.ivanov@2gis.ru": "ivanov"
  # "petr.petrov@2gis.ru": "petrov"

# jira-компонент → repo key (из repositories.yaml). ТОЧЕЧНЫЙ OVERRIDE над
# repositories.yaml → jira_components: основной список компонентов держим
# рядом с репо в repositories.yaml, а сюда добавляем только исключения.
# Матч точный и регистрозависимый (имя компонента как в Jira).
# Если компонент нигде не найден — Analyst попробует догадаться из текста.
component_to_repo:
  # "Bellingshausen API": bellingshausen
  # "Rainbow": rainbow

# repo_key → MM channel id (куда Reviewer / DevOps шлют пинги про этот репо).
# Лукап: сначала <repo_key>, потом <default>. Значения — **channel id**, не имя.
# Как получить id: открой канал в MM → ⓘ → Copy channel link, либо
# curl /api/v4/channels/name/<team-id>/<channel-name>.
#
# Каналы — персональные данные; держи их в config/local.yaml (gitignored),
# а не здесь. Этот файл в git видят все.
team_channels: {}

# Шаблон сообщения-дисклеймера бота (первое сообщение в треде / в личке).
disclaimer_template: |
  👋 Привет! Я — виртуальный разработчик команды DataMining (экспериментальный AI-бот).
  Могу ошибаться или говорить ерунду. Если видишь, что я делаю что-то не так — напиши `!ALARM` и меня остановит человек.
