# Шаблоны всех сообщений, которые бот пишет людям.
#
# Все формат-строки используют Python str.format. Список доступных
# placeholders приведён над каждым шаблоном.
# Условные секции (когда блок может быть пустым) делает рендер-код:
# в шаблон передаётся уже готовая строка (`_block`), пустая если
# секция не нужна.
#
# LLM-системные промпты (Analyst / Dev / ThreadResponder) — НЕ здесь,
# они в коде т.к. жёстко связаны с агентом.

# --- Mattermost ---
# Reviewer / DevOps пишут в `mappings.team_channels[<repo>]` или DM на
# `escalation.mattermost_user`. Все доступные placeholders:
# {repo_key}, {iid}, {title}, {web_url}, {idle_hours} (только в stale/escalation).
mattermost:
  # {summary} is a 1-2 sentence first-person feminine fragment from
  # the MrSummarizer ("добавила X, исправила Y"). Falls back to {title}
  # when no summarizer is wired.
  review_ping: |
    Ребята, приглашаю на [МР]({web_url}), в котором я {summary}

  merge_ping: |
    Мой реквестик [{iid}]({web_url}) собрал апрувы. Смержите, пожалуйста 😊

  stale_ping: |
    Ребят, мой [реквестик]({web_url}) ждёт ревью уже {idle_hours}ч 😔 Гляньте, пожалуйста 🙏

  escalation_dm: |
    Мой [МР]({web_url}) без активности уже {idle_hours}ч — напомни кому-нибудь или переназначь.

  # DevOps авто-фикс: ТОЛЬКО DM на escalation.mattermost_user, никогда не
  # в канал. Канал должен видеть MR только когда CI зелёный и можно ревью.
  # {repo_key}, {iid}, {title}, {web_url}, {attempts}, {failing_jobs}.
  pipeline_autofix_gave_up_dm: |
    Проблемка: CI на `{repo_key}!{iid}` не починился после {attempts} попыток авто-фикса.

    Title: {title}
    Failing jobs: {failing_jobs}
    URL: {web_url}

    Нужно вручную разобраться, что не так. Ответь `/restart` в этом треде, когда захочешь, чтобы я попробовала снова.

  # Подтверждение сброса авто-фикс счётчика по команде /restart от тимлида.
  pipeline_autofix_restart_ack: |
    Ок, сбросила счётчик попыток — пробую починить CI заново.

  # Reviewer thread responses (MmThreadListener). {commit_sha_short}, {branch}.
  thread_reply_no_dev_agent: "Не могу внести правку по этому репозиторию — нужна помощь человека."
  thread_reply_no_task: "Не нашла связанный тикет."
  thread_reply_iteration_crashed: "Попробовала внести правку, но не получилось — нужна помощь человека, гляньте логи."
  # Постится в тред когда CI на iteration-коммите станет зелёным.
  # До этого момента бот молчит — нет смысла звать ревьюеров на код,
  # который ещё не подтверждён пайплайном.
  thread_reply_iteration_done: "✅ Внесла правки, CI зелёный — коммит `{commit_sha_short}` на `{branch}`. Можно смотреть 🙏"
  thread_reply_iteration_no_changes: "Рабочее дерево осталось чистым — правка не потребовалась или я не смогла внести её. Смотри логи."

  # Постится top-level MR-комментом в GitLab когда фидбек был оставлен
  # в самом MR (а не в MM-треде). Текст идентичен thread_reply_iteration_done
  # по смыслу, но без MM-форматирования.
  gitlab_reply_iteration_done: "✅ Внесла правки, CI зелёный — коммит `{commit_sha_short}` на `{branch}`. Можно смотреть 🙏"

  # --- Lead-escalation DMs ---
  # The analyst agent composes the body of every per-recipient DM
  # itself, so we no longer template the clarifying questions. The two
  # templates below are for the *terminal* DMs the orchestrator sends
  # to the team-lead when the analyst gives up:
  #
  # * `stuck_escalation_to_lead` — analyst is stuck after multiple
  #   angles; ticket stays "In Progress".
  # * `blocked_escalation_to_lead` — analyst decided the ticket is
  #   blocked / unworkable; orchestrator has just transitioned it to
  #   "Waiting For Response" and posted an explanatory Jira comment.
  #
  # Placeholders for both: {tracker}, {external_id}, {task_url},
  # {original_question}, {chain_summary}, {reason}.
  stuck_escalation_to_lead: |
    Застряла с уточнением по тикету [{external_id}]({task_url}).

    **Причина:** {reason}

    **Цель:** {original_question}

    **Цепочка шагов:**
    {chain_summary}

    Помоги, пожалуйста, разобраться или подскажи, кому переадресовать.

  blocked_escalation_to_lead: |
    Перевела в Pending задачу [{external_id}]({task_url})

    **Причина:** {reason}

    **Цепочка шагов:**
    {chain_summary}

    Помоги, пожалуйста, разобраться или подскажи, кому переадресовать.

# --- Jira (комментарии к тикетам) ---
# Доступные placeholders:
#   {tracker}, {external_id}, {status}, {confidence}, {summary},
#   {iterations}, {target_repo_block}, {steps_block},
#   {open_questions_block}, {risks_block}, {dashboard_block},
#   {web_url}, {branch}, {branch_block}, {notes_block}.
jira:
  plan_comment: |
    *Написала план по задаче*

    *Статус:* {status}
    *Увереность в плане:* {confidence}
    {target_repo_block}
    *Суть*
    {summary}
    {steps_block}
    {open_questions_block}
    {risks_block}

    _Шаги: {iterations}._
    {dashboard_block}

  mr_link_comment: |
    *Открыла реквест по задаче*

    - MR: {web_url}
    - Ветка: `{branch}`

    _Приходите на ревью_

  failure_comment: |
    *К сожалению, не смогла завершить задачу.*
    {branch_block}
    {notes_block}

    _Тут надо разобраться человеку. Прошу прощения, что у меня не получилось._

  # Posted when the analyst calls `blocked` — we move the ticket to
  # "Waiting For Response" and explain why in this comment, then DM
  # the lead with `blocked_escalation_to_lead`.
  # Available placeholders: {external_id}, {task_url}, {reason}.
  blocked_comment: |
    *Кинула задачу в PENDING*

    **Причина:** {reason}

    Уведомила тимлида и больше не работаю над тикетом до дальнейших указаний.

# --- GitLab MR (то, что бот сам пишет в title / description / commit) ---
# {key} — ticket external id, {title} — модель-сабмит, {url} — ticket URL,
# {description} — модель-сабмит, {plan_block}, {notes_block}.
merge_request:
  title: "{key}: {title}"
  commit_message: "[{key}] {title}"
  description: |
    **Задача:** [{key}]({url})

    {description}
    {plan_block}
    {notes_block}
