# Список репозиториев, на которых работает бот.
#
# Как это работает:
# - Orchestrator при старте читает этот файл.
# - Для каждого репо поднимает N dev-агентов в соответствии с `agents`.
# - Можно добавить новый репо — и после перезапуска появятся новые агенты.
#
# Поля:
#   key                — уникальный идентификатор (snake_case).
#   url                — SSH или HTTPS URL GitLab-репо.
#   local_path         — (опц.) путь к уже склонированному репо. Если не задан — клонируем в WORKSPACES_DIR/<key>.
#   description        — для дашборда.
#   jira_components    — список jira-компонентов, которые роутятся в этот репо. Используется Analyst-агентом.
#   default_branch     — базовая ветка для MR (обычно main / master / develop).
#   agents             — кто работает с этим репо:
#       backend:   true|false
#       frontend:  true|false
#       devops:    true|false
#   primary_language   — для backend-агента: подсказка в prompt (python, go, ...).
#   frontend_stack     — для frontend-агента: (опц.) react, vue, typescript-react, ...
#   tests_cmd          — команда прогона тестов (для QA-агента и backend/frontend-агентов).
#   lint_cmd           — команда линтера.
#   ci_provider        — gitlab_ci (на будущее — github_actions, etc).

repositories:
  - key: bellingshausen
    url: git@gitlab.2gis.ru:sd-data-mining/bellingshausen.git
    local_path: /Users/andreyvolobuev/Documents/2gis/bellingshausen
    description: "Монорепа (бэкенд + фронтенд)."
    jira_components: []  # заполнишь позже
    default_branch: master   # проверь, возможно main
    agents:
      backend: true
      frontend: true
      devops: false
    primary_language: python
    frontend_stack: unknown   # заменить на реальный: react, vue, ...
    tests_cmd: "pytest"
    lint_cmd: "ruff check ."
    ci_provider: gitlab_ci

