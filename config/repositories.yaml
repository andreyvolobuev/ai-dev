# Список репозиториев, на которых работает бот.
#
# Как это работает:
# - Orchestrator при старте читает этот файл.
# - Для каждого репо поднимает N dev-агентов в соответствии с `agents`.
# - Можно добавить новый репо — и после перезапуска появятся новые агенты.
#
# Поля:
#   key                — уникальный идентификатор (snake_case).
#   url                — SSH или HTTPS URL GitLab-репо.
#   local_path         — (опц.) путь к уже склонированному репо. Если не задан — клонируем в WORKSPACES_DIR/<key>.
#   description        — для дашборда.
#   jira_components    — jira-компоненты, которые роутятся в этот репо (читает Analyst). Точечно переопределяется в config/mappings.yaml → component_to_repo.
#   default_branch     — базовая ветка для MR (обычно main / master / develop).
#   agents             — кто работает с этим репо:
#       backend:   true|false
#       frontend:  true|false
#       devops:    true|false
#   primary_language   — для backend-агента: подсказка в prompt (python, go, ...).
#   frontend_stack     — для frontend-агента: (опц.) react, vue, typescript-react, ...
#   tests_cmd          — команда прогона тестов (для QA-агента и backend/frontend-агентов).
#   lint_cmd           — команда линтера.
#   ci_provider        — gitlab_ci (на будущее — github_actions, etc).

repositories:
  - key: bellingshausen
    url: git@gitlab.2gis.ru:sd-data-mining/bellingshausen.git
    # local_path — машино-зависимо; задаётся в config/local.yaml (gitignored).
    description: "Монорепа парсеров/API (Flask + FastAPI + воркеры), Python 3.13 + React/Vite фронт."
    jira_components: ["Krusenstern"]
    default_branch: master
    agents:
      backend: true
      frontend: true
      devops: false
    primary_language: python
    frontend_stack: react
    tests_cmd: "pytest"
    lint_cmd: "make local-style"
    ci_provider: gitlab_ci

  - key: rainbow
    url: git@gitlab.2gis.ru:sd-data-mining/rainbow.git
    description: "Парсинг открытых источников и всё, что с этим связано (мульти-сервисный Python-монореп)."
    jira_components: ["Rainbow"]
    default_branch: master
    agents: { backend: true, frontend: false, devops: false }
    primary_language: python
    tests_cmd: "pytest"
    lint_cmd: "make lint"
    ci_provider: gitlab_ci

  - key: pts_aggregator
    url: git@gitlab.2gis.ru:sd-data-mining/pts-aggregator.git
    description: "Агрегатор расписаний общественного транспорта: GTFS→БД, постобработка, кормит Fiji (Celery)."
    jira_components: ["PTS"]
    default_branch: master
    agents: { backend: true, frontend: false, devops: false }
    primary_language: python
    tests_cmd: "pytest"
    lint_cmd: "flake8"
    ci_provider: gitlab_ci

  - key: greeder
    url: git@gitlab.2gis.ru:sd-data-mining/greeder.git
    agents: { backend: true, frontend: false, devops: false }
    description: "Обогащение карточек 2ГИС госданными (ФНС, бухотчётность) — Python-сервис (aiohttp)."
    jira_components: ["Greeder"]
    default_branch: master
    primary_language: python
    tests_cmd: "./dev.sh unit"
    lint_cmd: "./dev.sh lint"
    ci_provider: gitlab_ci

  - key: alertilka_backend
    url: git@gitlab.2gis.ru:sd-data-mining/alertilka/alertilka-backend.git
    agents: { backend: true, frontend: false, devops: false }
    description: "Бэкенд Alertilka на FastAPI (API, alert-manager, garbage-collector)."
    jira_components: ["Alertilka"]
    default_branch: master
    primary_language: python
    tests_cmd: "pytest"
    lint_cmd: "make ci-checks"
    ci_provider: gitlab_ci
