# Настройки агентов и Jira-фильтрации.
#
# Модели:
#   Используем Claude Sonnet 4.5 как основную, Haiku для лёгких задач.
#   Названия модели можно переопределить на агента.
#   Полный перечень моделей: https://docs.claude.com/en/docs/about-claude/models/overview
#
# ВАЖНО: бот работает через Claude Max подписку (claude CLI в subprocess),
# так что полей про budget / токены / деньги тут НЕТ. max_iterations_per_task —
# это защита от runaway-цикла (не биллинг), rate_limit_per_hour — защита от
# спама в MM каналах (Phase 3).

models:
  default: "claude-sonnet-4-5"
  lightweight: "claude-haiku-4-5"

# JQL, по которому Orchestrator забирает задачи из Jira.
# На старте — свои задачи пользователя с определённым label.
# Позже можно поменять на отдельный bot-аккаунт (assignee = "ai-dev").
task_source:
  jql: 'assignee = currentUser() AND labels = "ai-dev" AND status = "To Do"'
  poll_interval_seconds: 120

# Переходы статусов в Jira: значения — точные имена ЦЕЛЕВЫХ статусов
# (`transition.to`), не имён транзишнов. Адаптер находит транзишн по
# совпадению `to == <имя>`. Если не найдено — логирует доступные
# варианты и не падает.
#
# DM-проект на 2026-04-25 предлагает статусы:
#   To Do, In Review, Testing, Waiting For Response,
#   Готово к разработке, Closed.
jira_transitions:
  to_in_progress: "In Progress"
  to_review: "In Review"
  to_testing: "Testing"
  to_done: "Closed"

# Рабочие часы для общения в Mattermost (Московское время).
# Вне этих часов Communicator копит задачи и шлёт утром.
working_hours:
  timezone: "Europe/Moscow"
  start_hour: 10
  end_hour: 20
  weekdays_only: true

# Настройки по отдельным агентам.
agents:
  orchestrator:
    model: default

  analyst:
    model: default
    # Анализ — разведка в репе: grep → read_file → снова grep ... + финальный
    # submit_plan. На реальном репо уходит 20–30 turns. 15 было мало — CLI
    # валился с exit 1 на `stop=tool_use`, не дав дойти до submit_plan.
    max_iterations_per_task: 40

  researcher:
    model: default

  communicator:
    model: lightweight  # мелкие сообщения, Haiku справится
    rate_limit_per_hour: 20  # не более N сообщений в канал/личку за час (Phase 3)

  developer:
    model: default
    max_iterations_per_task: 80    # coding + правки по тестам — turns быстро уходят

  reviewer:
    model: default

  qa:
    model: default

  devops:
    model: default

  # Phase 3.8 — clarification subsystem agents.
  # answer_classifier: классификатор ответов от стейкхолдеров.
  # Лёгкая задача (структурированный enum + извлечение полей) → Haiku.
  answer_classifier:
    model: lightweight

  # counter_answerer: бот сам отвечает на factual counter-questions
  # (читает Issue + код), для business-counter — эскалирует.
  # Sonnet потому что нужны Read/Glob/Grep + понимание кода.
  counter_answerer:
    model: default
    max_iterations_per_task: 20

  # stakeholder_resolver: получает свободно-формное имя ("Вася Курочкин")
  # + список MM-кандидатов и выбирает совпадение, или говорит "не знаю".
  stakeholder_resolver:
    model: lightweight

# Ревью-политика.
review_policy:
  required_approvals: 1
  ping_reviewers_after_hours: 4
  escalate_after_hours: 24

# Авто-фикс CI. DevOps на красном пайплайне сам зовёт Dev на правки и
# повторяет до max_autofix_attempts; после — DM тимлиду из escalation.
# Пайплайны НИКОГДА не упоминаются в командных каналах.
pipeline_policy:
  max_autofix_attempts: 3

# Эскалация: куда писать, когда бот застрял.
escalation:
  mattermost_user: ""  # твой MM-хендл — переопредели в config/local.yaml (gitignored)

# Параметры цикла уточнений (Phase 3.8).
# coalesce_window_seconds: сколько ждать «тишины» перед классификацией ответа.
#   Если человек пишет в 5 сообщений с паузами — мы не дёргаем LLM на каждом.
# max_chain_depth: a→b→c→d (depth=3); пятый редирект → эскалация.
# max_question_age_hours: timeout per Question (deadline_sweep тика coalescer'а).
# max_subquestions_per_root: страховка от runaway-дерева.
# counter_question_confidence_threshold: ниже этого — fallback на эскалацию автору.
clarification:
  coalesce_window_seconds: 600
  poll_interval_seconds: 60
  max_chain_depth: 4
  max_question_age_hours: 48
  max_subquestions_per_root: 10
  counter_question_confidence_threshold: 0.6
