# Alembic configuration. The actual sqlalchemy.url is supplied by
# migrations/env.py at runtime (from Settings) so secrets / per-env
# paths don't end up here.
[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os
sqlalchemy.url =


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
